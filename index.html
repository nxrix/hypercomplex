<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./assets/css/theme.css">
  <link rel="stylesheet" href="./assets/css/layout.css">
  <link rel="stylesheet" href="./assets/css/tool.css">
  <title>?</title>

<body>

<div class="wrapper">
  <div id="content" style="opacity:0;padding-top:14px">
    
    <h1>Hypercomplex</h1>

    This tool is not complete yet!

    <hr>

    <canvas id="canvas" style="border-radius:8px"></canvas>

    <br>
    <br>

    <div>
      <label for="camera_fov">FOV</label>
      <input type="range" name="camera_fov" id="camera_fov" min="30" max="90" step="5" value="45">
    </div>
    
    <div>
      <label for="camera_type">Orthographic</label>
      <input type="checkbox" name="camera_type" id="camera_type" checked>
    </div>
    
    <br>

    <div class="controls">

      <div style="display:flex">
        <input id="vinput" type="number" style="text-align:center" value="0">
      </div>

      <div id="orders">
        <button>0</button>
        <button>1</button>
        <button>2</button>
        <button>3</button>
      </div>

      <div id="signs">
      </div>

      <div style="display:grid;grid-template-columns:1fr 2fr 1fr;gap:2px">
        <button id="prev"><</button>
        <div style="display:flex">
          <input id="ninput" type="number" style="text-align:center" value="0" min="0" max="575">
        </div>
        <button id="next">></button>
      </div>

    </div>

    <br>

    <div style="margin-top:16px">
      <button onclick="save_image()">Save Image</button>
      <button onclick="save_image(true)">Save Image Anti-Aliased</button>
      <br>
      
      <button onclick="save_shader()" style="margin-top:8px">Export for ShaderToy</button>
    </div>

    <hr>

    <h2>Examples</h2>
    <p>
      <a class="link" onclick="load(this.innerText)">53766148</a>
      <br>

      <br>

      <br>
      <a class="link" onclick="load(this.innerText)">21256704</a>
      <br>
      <a class="link" onclick="load(this.innerText)">33638400</a>
    </p>

    <hr>

    <table id="table" style="font-size:12px;text-align:center"></table>

  </div>
  <div style="margin-top:auto;">
    <hr>
    <div id="footer">Copyright nxrix, 2026</div>
  </div>
</div>
